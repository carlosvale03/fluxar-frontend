name: CI Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'fluxar-frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'fluxar-frontend/**'

jobs:
  build-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./fluxar-frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: fluxar-frontend/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Run Lint
      run: npm run lint

    - name: Build Check
      run: npm run build
      env:
        # Variavel fake apenas para o build passar sem erros de referencia
        NEXT_PUBLIC_API_URL: "http://build-check-placeholder"
