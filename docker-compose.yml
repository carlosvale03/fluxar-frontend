services:
  frontend:
    build: .
    # Habilita Hot Reload (Polling) para funcionar bem no Docker em Windows
    environment:
      - WATCHPACK_POLLING=true
    env_file:
      - .env.local
    volumes:
      - ${PWD}:/app        # Mapeia sua pasta local para dentro do container
      - /app/node_modules             # Evita que o node_modules local (Windows) sobrescreva o do container (Linux)
      - /app/.next                    # Protege a pasta de build
    ports:
      - "3000:3000"
    command: npm run dev -- --webpack --port 3000 --hostname 0.0.0.0
